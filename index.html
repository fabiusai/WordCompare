<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Diff Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --box-bg: #ffffff;
            --text-color: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p.desc {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .file-group {
            margin-bottom: 25px;
        }

        .file-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px dashed #ccc;
            border-radius: 5px;
            background-color: #fafafa;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #004494;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: #d9534f;
        }

        .success {
            color: #5cb85c !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Analizzatore Modifiche Word</h1>
        <p class="desc">Carica il documento originale e quello modificato. L'app creerà un nuovo file Word con il nuovo testo a sinistra e le modifiche a destra.</p>

        <div class="file-group">
            <label for="fileOriginale">1. Documento Originale (.docx)</label>
            <input type="file" id="fileOriginale" accept=".docx">
        </div>

        <div class="file-group">
            <label for="fileModificato">2. Documento Modificato (.docx)</label>
            <input type="file" id="fileModificato" accept=".docx">
        </div>

        <button id="btnGenera" onclick="processFiles()">Confronta e Genera Word</button>
        <div id="status"></div>
    </div>

    <script>
        // Funzione per estrarre il testo da un file Word tramite Mammoth.js
        function extractTextFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const arrayBuffer = event.target.result;
                    mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                        .then(result => resolve(result.value))
                        .catch(err => reject(err));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        async function processFiles() {
            const fileOriginale = document.getElementById('fileOriginale').files[0];
            const fileModificato = document.getElementById('fileModificato').files[0];
            const statusDiv = document.getElementById('status');
            const btnGenera = document.getElementById('btnGenera');

            if (!fileOriginale || !fileModificato) {
                statusDiv.innerText = "Per favore, carica entrambi i documenti.";
                statusDiv.className = "";
                return;
            }

            try {
                btnGenera.disabled = true;
                statusDiv.innerText = "Estrazione del testo in corso...";
                statusDiv.className = "";

                // 1. Estrai il testo dai due documenti
                const testoOriginale = await extractTextFromFile(fileOriginale);
                const testoModificato = await extractTextFromFile(fileModificato);

                statusDiv.innerText = "Confronto dei testi in corso...";

                // 2. Confronta i paragrafi (linee)
                const differenze = Diff.diffLines(testoOriginale, testoModificato);

                statusDiv.innerText = "Generazione del nuovo file Word...";

                // 3. Prepara la libreria Docx
                const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle } = docx;

                const righeTabella = [];

                // Aggiungi l'intestazione della tabella
                righeTabella.push(
                    new TableRow({
                        children: [
                            new TableCell({
                                width: { size: 70, type: WidthType.PERCENTAGE },
                                margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                children: [new Paragraph({ children: [new TextRun({ text: "Nuovo Testo", bold: true, size: 24 })] })] // size: 24 = 12pt
                            }),
                            new TableCell({
                                width: { size: 30, type: WidthType.PERCENTAGE },
                                margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                children: [new Paragraph({ children: [new TextRun({ text: "Modifiche Effettuate", bold: true, size: 18 })] })] // size: 18 = 9pt
                            })
                        ]
                    })
                );

                // Analizza le differenze e costruisci le righe
                differenze.forEach(parte => {
                    // Dividi la parte in righe per evitare blocchi enormi e pulisci le righe vuote
                    let linee = parte.value.split('\n').filter(l => l.trim() !== '');
                    if (linee.length === 0) return;

                    linee.forEach(linea => {
                        let testoColonna1 = "";
                        let testoColonna2 = "";
                        let coloreColonna2 = "000000";

                        if (parte.added) {
                            testoColonna1 = linea;
                            testoColonna2 = "Aggiunto";
                            coloreColonna2 = "008000"; // Verde
                        } else if (parte.removed) {
                            testoColonna1 = ""; // Non c'è nel nuovo testo
                            testoColonna2 = "Rimosso: " + linea;
                            coloreColonna2 = "FF0000"; // Rosso
                        } else {
                            testoColonna1 = linea; // Testo rimasto uguale
                            testoColonna2 = ""; 
                        }

                        // Creazione della riga
                        righeTabella.push(
                            new TableRow({
                                children: [
                                    new TableCell({
                                        margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                        children: testoColonna1 ? [new Paragraph({
                                            children: [new TextRun({ text: testoColonna1, size: 24 })] // Font normale (12pt)
                                        })] : [new Paragraph("")]
                                    }),
                                    new TableCell({
                                        margins: { top: 100, bottom: 100, left: 100, right: 100 },
                                        children: testoColonna2 ? [new Paragraph({
                                            children: [new TextRun({ 
                                                text: testoColonna2, 
                                                size: 16, // Font ridotto (8pt)
                                                color: coloreColonna2,
                                                italics: true
                                            })]
                                        })] : [new Paragraph("")]
                                    })
                                ]
                            })
                        );
                    });
                });

                // 4. Crea la tabella (70% sinistra, 30% destra)
                const tabella = new Table({
                    width: { size: 100, type: WidthType.PERCENTAGE },
                    rows: righeTabella,
                    borders: { // Bordi leggeri per facilitare la lettura
                        top: { style: BorderStyle.SINGLE, size: 1, color: "E0E0E0" },
                        bottom: { style: BorderStyle.SINGLE, size: 1, color: "E0E0E0" },
                        left: { style: BorderStyle.NONE },
                        right: { style: BorderStyle.NONE },
                        insideHorizontal: { style: BorderStyle.SINGLE, size: 1, color: "E0E0E0" },
                        insideVertical: { style: BorderStyle.SINGLE, size: 1, color: "E0E0E0" },
                    }
                });

                // 5. Crea il documento Word finale
                const doc = new Document({
                    sections: [{
                        properties: {},
                        children: [tabella]
                    }]
                });

                // 6. Genera e scarica il file
                const blob = await Packer.toBlob(doc);
                saveAs(blob, "Documento_Confrontato.docx");

                statusDiv.innerText = "Completato! Il file è stato scaricato.";
                statusDiv.className = "success";

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Si è verificato un errore durante l'elaborazione dei file.";
            } finally {
                btnGenera.disabled = false;
            }
        }
    </script>
</body>
</html>
